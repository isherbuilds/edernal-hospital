services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tsu-stack}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "${DB_DEV_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-dev:/var/lib/postgresql

volumes:
  postgres-dev:
